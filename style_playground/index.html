<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clean Button Styles</title>
<style>
  body {
    background-color: #2e2e32; /* Sleek dark background matching your UI */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  .button-group {
    display: flex;
    flex-direction: column;
    gap: 16px; /* Slightly more breathing room between buttons */
    width: 220px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px; 
    padding: 14px 24px;
    font-size: 15px;
    font-weight: 500; /* Slightly lighter weight for a cleaner look */
    letter-spacing: 0.3px;
    border: none;
    border-radius: 12px; /* Smoother, more modern corners */
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); /* Premium feeling transition */
  }

  .btn svg {
    width: 18px;
    height: 18px;
    opacity: 0.9; /* Softens the icon slightly so it doesn't overpower text */
  }

  /* --- Primary - Refined Red --- */
  .btn-primary {
    background-color: #f05151; /* A highly visible, but not harsh, red */
    color: #ffffff;
    box-shadow: 0 4px 12px rgba(240, 81, 81, 0.25); /* Colored glow effect */
  }

  .btn-primary:hover {
    background-color: #f46060;
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(240, 81, 81, 0.35);
  }

  .btn-primary:active {
    transform: translateY(0);
    box-shadow: 0 2px 4px rgba(240, 81, 81, 0.2);
  }

  /* --- Secondary - Clean "Glass" Style --- */
  .btn-secondary {
    background-color: rgba(255, 255, 255, 0.06); /* Barely-there white fill */
    color: #e5e5e5; /* Off-white text to reduce glare */
    border: 1px solid rgba(255, 255, 255, 0.1); /* Subtle, crisp border */
  }

  .btn-secondary:hover {
    background-color: rgba(255, 255, 255, 0.12);
    color: #ffffff;
    border-color: rgba(255, 255, 255, 0.2);
  }

  .btn-secondary:active {
    background-color: rgba(255, 255, 255, 0.04);
  }
</style>
</head>
<body>

<div class="button-group">
  <button class="btn btn-primary">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 17a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v2a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-2Z"></path><path d="M3 7l9-4 9 4-9 4-9-4Z"></path></svg>
    Test
  </button>

  <button class="btn btn-secondary">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 17a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v2a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-2Z"></path><path d="M3 7l9-4 9 4-9 4-9-4Z"></path></svg>
    Generate Video
  </button>
</div>

</body>
</html>
